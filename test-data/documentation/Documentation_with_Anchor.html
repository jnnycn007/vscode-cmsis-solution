<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Link Example</title>
	<style>
        p {
            margin-bottom: 300px;
        }
    </style>
</head>
<body>

    <h1>Welcome to Pack X documentation</h1>
    <p>This is a simple example of pack documentation with anchor.</p>


    <!-- Anchor link to another section in the same file -->
    <p><a href="#HID">Go to Section HID</a></p>

    <h2 id="HID">Section HID</h2>
    <p>This is the content of Section HID. You have reached here using an anchor link within the same page.</p>

    <!-- Link to go back to the top -->
    <p><a href="#top">Back to Top</a></p>

</body>
</html>
